<!DOCTYPE html>
<html>
<head>
  <title>Orb Simulator</title>
  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: 40px auto;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    .section {
      margin-bottom: 25px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input, select {
      padding: 6px;
      font-size: 14px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    .small-btn {
      padding: 5px 8px;
      font-size: 12px;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 15px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>Orb Simulator</h1>

<!-- TARGETS -->
<div class="section">
  <h3>Targets</h3>
  <h4>Double Click to Confirm</h4>
  <div id="targetsList"></div>
  <button onclick="addTarget()">+ Add Target</button>
</div>

<!-- ORBS -->
<div class="section">
  <h3>Orb Sequence</h3>
  <h4>Activate Top to Bottom</h4>
  <div id="orbsList"></div>
  <button onclick="addOrb()">+ Add Orb</button>
</div>

<!-- COMBO -->
<div class="section">
  <h3>Combo Targets</h3>
  <h4>Select Two Only. Shows Probability Both or Either targets are destroyed.</h4>
  <div id="comboList"></div>
</div>

<button onclick="runUI()">Run Probability</button>

<pre id="output"></pre>

<script src="script.js"></script>

<script>
// ---------- TARGET UI ----------
function addTarget(name = "", hp = "") {
  const div = document.createElement("div");
  div.className = "row";

  div.innerHTML = `
    <input placeholder="Name" value="${name}">
    <input type="number" placeholder="HP" value="${hp}">
    <button class="small-btn" onclick="this.parentElement.remove(); refreshCombo()">X</button>
  `;

  document.getElementById("targetsList").appendChild(div);
  refreshCombo();
}

// ---------- ORB UI ----------
function addOrb(type = "L", dmg = 1) {
  const div = document.createElement("div");
  div.className = "row";

  div.innerHTML = `
    <select>
      <option value="L" ${type === "L" ? "selected" : ""}>L</option>
      <option value="G" ${type === "G" ? "selected" : ""}>G</option>
    </select>
    <input type="number" value="${dmg}">
    <button class="small-btn" onclick="this.parentElement.remove()">X</button>
  `;

  document.getElementById("orbsList").appendChild(div);
}

// ---------- COMBO UI ----------
let selectedCombo = []; // keeps track of currently selected combo targets

function refreshCombo() {
  const comboDiv = document.getElementById("comboList");
  comboDiv.innerHTML = "";
  selectedCombo = []; // reset selection whenever targets are refreshed

  const targets = document.querySelectorAll("#targetsList .row");

  targets.forEach(row => {
    const name = row.children[0].value;
    if (!name) return;

    const label = document.createElement("label");
    label.style.display = "block";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.value = name;

    // add event listener to enforce 2-selection limit
    checkbox.addEventListener("change", function() {
      if (this.checked) {
        selectedCombo.push(this);
        if (selectedCombo.length > 2) {
          // uncheck oldest selection
          const old = selectedCombo.shift();
          old.checked = false;
        }
      } else {
        // remove from selection if unchecked
        selectedCombo = selectedCombo.filter(cb => cb !== this);
      }
    });

    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(" " + name));

    comboDiv.appendChild(label);
  });
}

// ---------- RUN ----------
function runUI() {
  try {
    const targets = {};
    const orbs = [];
    const combo = [];

    // Targets
    const targetRows = document.querySelectorAll("#targetsList .row");

    if (targetRows.length === 0) throw new Error("Add at least 1 target.");
    if (targetRows.length > 20) throw new Error("Max 20 targets.");

    targetRows.forEach(row => {
      const name = row.children[0].value.trim();
      const hp = Number(row.children[1].value);

      if (!name) throw new Error("Target missing name.");
      if (!hp || hp < 0) throw new Error("Invalid HP.");

      targets[name] = hp;
    });

    // Orbs
    const orbRows = document.querySelectorAll("#orbsList .row");

    if (orbRows.length === 0) throw new Error("Add at least 1 orb.");
    if (orbRows.length > 20) throw new Error("Max 20 orbs.");

    orbRows.forEach(row => {
      const type = row.children[0].value;
      const dmg = Number(row.children[1].value);

      if (!dmg || dmg < 0) throw new Error("Invalid orb damage.");

      orbs.push([type, dmg]);
    });

    // Combo
    document.querySelectorAll("#comboList input:checked")
      .forEach(cb => combo.push(cb.value));

    const result = calculateExactStats(targets, orbs, combo);

    let text = "--- Results ---\n\n";

    for (const id of Object.keys(result.destructionProbs)) {
      text += `${id}:\n`;
      text += `  Destroyed: ${(result.destructionProbs[id] * 100).toFixed(2)}%\n`;
      text += `  Exp Damage: ${result.expectedDamage[id].toFixed(2)}\n\n`;
    }

    text += "--- Combo ---\n";
    text += `Both: ${(result.bothDestroyedProb * 100).toFixed(2)}%\n`;
    text += `Either: ${(result.eitherDestroyedProb * 100).toFixed(2)}%\n`;

    document.getElementById("output").textContent = text;

  } catch (err) {
    document.getElementById("output").textContent = "Error:\n" + err.message;
  }
}

// ---------- STARTER DATA ----------
addTarget("Nibbit", 15);
addTarget("Leaf Slime", 6);

addOrb("L", 3);
addOrb("G", 2);
addOrb("L", 3);
</script>

</body>
</html>
